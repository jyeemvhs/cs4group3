<!DOCTYPE html>
<!--   -->
<html>
  <head>
    <title>Ajax</title>
    <meta charset="utf-8"/>
    <style type="text/css">

    </style>
    <script src="https://code.jquery.com/jquery-2.1.3.min.js"></script>
  </head>
  
  <body> 
  <div class="container"> 
     <div class="box title">
          <header
            class="box">
            <h1>Login<h1>
          </header>
      </div>
      <div class="box main">
         <div id="playName">
              Username:
          </div>
           <div id="play">
             <br>
                <input id="username" type="text" name="username"><br>
          </div>
          <div id="signupName">
            User password:
          </div>
          <div id="signup">
            <br>
                 <input id="psw" type="password" name="psw">
          </div>
          <div id="button">
            <br>
              <a href="./signup">Signup</a>
          </div>
      </div>

	   <script src="js/login.js"></script>
  </div>
    </body>
    <style>
     body, html {
    background-color: #262626;
    height: 100%;
    padding:0;
    margin: 0;
    }
   *{
      box-sizing: border-box;
    }
    a {
        margin-left:auto;
        margin-right:auto;
        color: white;
        text-decoration: none;
        background-color: #5c5c5c;
        font-size: 45px;    
        padding: 5px;

      }    
      a:hover {
        color: #5c5c5c;
        background-color: black;
        border-style: solid;
        border-width: 1px;
        border-color: #5c5c5c;
        font-size: 45px;
           
      }
    .container{
      border:100px solid black;
    }
    .container {
        display: grid;
        grid-template-areas:
            "a"
            "b";
        grid-template-rows: 20% 80%;
        grid-template-columns: 100%;
        height: auto;
        background-color: black;
    }
    .box {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    input[type="text"]{
        width:100%;
        height:100%;
        float:left;
        float:top;
    }
    header {
        grid-area: a;
        color: white;
        background-color: #262626;
    }
    .title{
      border:2px solid white;
      background-color: #262626;
      grid-area:a;
      height:100%;
      width:100%;
      font-size: 22px;
    }
    .main{
      border:2px solid white;
      background-image:url("dice.jpg");
      background-repeat:no-repeat;
      background-position: center;
      background-size:cover;
      grid-area:b;
      display: grid;
      grid-template-areas:
          "uu"
          "hh"
          "oo"
          "zz"
          "ff";
      grid-template-rows: 15% 15% 15% 15% 40%;
    }    
     #playName{
      font-size: 40px;
      grid-area:uu;
      display:flex;
      color: white;
      justify-content:center;
      align-items:center;
    }
    #play{
      grid-area:hh;
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:auto;
    }
    #signupName{
       font-size: 40px;
      grid-area:oo;
      display:flex;
      color: white;
      justify-content:center;
      align-items:center;
    }
    #signup{
      grid-area:zz;
      display:flex;
      justify-content:center;
      align-items:center;
       margin-bottom:auto;
    }
    #button{
      grid-area:ff;
      display:flex;
      justify-content:center;
      align-items:center;
       margin-bottom:auto;
    }
    @media ( min-width: 768px ) {
        .container {
        grid-template-areas:
            "a"
            "b";
        grid-template-rows: 20% 80%;
        grid-template-columns: 100%;
        height: 100%;
    }

    @media ( min-width: 992px ) {
        .container {
        grid-template-areas:
            "a"
            "b";
        grid-template-rows: 20% 80%;
        grid-template-columns: 100%;
        height: 100%;
        }
    }
    </style>
</html>
